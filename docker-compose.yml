version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: ecommerce_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ecommerce_ai_redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
